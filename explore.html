<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Explore - Heterogeneity-Adjusted EWAS Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Interactive filtering and sorting for haEWAS meta-analysis summaries." />
  <link rel="icon" href="assets/img/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="assets/styles.css?v=20260527a" />
  <script src="assets/site-config.js?v=20260527a"></script>
  <script defer src="assets/explore.js?v=20260527a"></script>
  
  <script src="assets/plotly.min.js"></script>
</head>
<body class="portal-page">
  <header class="site-header">
    <div class="nav-wrap container">
      <a class="brand" href="index.html#home">
        <img src="assets/img/logo.jpg" alt="Logo" class="logo" />
        <span class="brand-text gradient-text">Heterogeneity-Adjusted EWAS Explorer</span>
      </a>
      <nav class="nav">
        <a href="index.html#home" class="nav-link">Home</a>
        <a href="statistics.html" class="nav-link">Statistics</a>
        <a href="explore.html" class="nav-link active" aria-current="page">Explore</a>
        <a href="converter.html" class="nav-link">Converter</a>
        <a href="download.html" class="nav-link">Download</a>
        <a href="index.html#citation" class="nav-link">Citation</a>
      </nav>
    </div>
  </header>

  <main class="container section portal-main">

    <form id="filters" class="filters portal-filters">
      <div class="field">
        <label for="phenotype">Phenotype</label>
        <select id="phenotype" class="select">
          <option value="">All</option>
        </select>
      </div>

      <div class="field">
        <label for="chromosome">Chromosome</label>
        <select id="chromosome" class="select">
          <option value="">All</option>
        </select>
      </div>

      <div class="field">
        <label for="group">Group</label>
        <select id="group" class="select">
          <option value="">All</option>
        </select>
      </div>
      
      <div class="field">
        <label class="eyebrow" for="pValueThresh">Max P-value</label>
        <select id="pValueThresh" class="select">
          <option value="">All (FDR &lt; 0.05)</option>
          <option value="1e-3">P &lt; 1e-3</option>
          <option value="1e-4">P &lt; 1e-4</option>
          <option value="1e-5">P &lt; 1e-5</option>
          <option value="1e-6">P &lt; 1e-6</option>
          <option value="1e-7">P &lt; 1e-7</option>
          <option value="1e-8">P &lt; 1e-8</option>
        </select>
      </div>

      <div class="field grow">
        <label for="search">Search</label>
        <input id="search" class="input" type="search" placeholder="Search CpG, Gene..." />
      </div>

      <button type="button" id="resetBtn" class="btn ghost">Reset</button>
    </form>

    <div id="plotContainer" class="portal-plot"></div>

    <div id="topScrollWrapper" class="portal-top-scroll">
      <div id="topScrollDummy" class="portal-top-scroll-dummy"></div>
    </div>

    <div class="table-wrap portal-data-card portal-table-wrap" id="tableWrap">
      <table id="resultsTable" class="table portal-table">
        <thead>
          <tr>
            <th data-sort="CpG_ID">CpG_ID</th>
            <th data-sort="Phenotype">Phenotype</th>
            <th data-sort="Chromosome">Chromosome</th>
            <th data-sort="Start">Start</th>
            <th data-sort="End">End</th>
            <th data-sort="Gene_name">Gene_name</th>
            <th data-sort="Gene_region">Gene_region</th>
            <th data-sort="Relation_to_island">Relation_to_island</th>
            <th data-sort="P_haEWAS">P_haEWAS</th>
            <th data-sort="Effect_haEWAS">Effect_haEWAS</th>
            <th data-sort="FDR_haEWAS">FDR_haEWAS</th>
            <th data-sort="P_Beta">P_Beta</th>
            <th data-sort="Effect_Beta">Effect_Beta</th>
            <th data-sort="FDR_Beta">FDR_Beta</th>
            <th data-sort="Group">Group</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="table-footer portal-table-footer" id="tableFooter">
      <div id="rowCount"></div>
      
      <div class="portal-pager-controls">
        
        <div class="portal-page-size">
          <select id="pageSize" class="select portal-page-size-select">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="300">300</option>
            <option value="400">400</option>
            <option value="500">500</option>
          </select>
          <span class="portal-page-size-note">rows/page</span>
        </div>

        <div class="pager portal-page-nav">
          <button class="btn ghost" id="prevPage" disabled>&larr; Prev</button>
          
          <div class="portal-page-jump">
            <span>Page</span>
            <input type="number" id="pageInput" class="input portal-page-input" value="1" min="1" />
            <span> / <span id="totalPagesInfo">1</span></span>
          </div>

          <button class="btn ghost" id="nextPage">Next &rarr;</button>
        </div>
        
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Heterogeneity-Adjusted EWAS Explorer.</p>
    </div>
  </footer>
</body>
</html>
